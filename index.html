<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOMSOFT | Mobile App Studio</title>

<style>

/* ========================= */
/* 기본 스타일 */
/* ========================= */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f5f7fa;
color:#1d1d1f;
line-height:1.6;
}

.container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

/* ========================= */
/* NAVBAR */
/* ========================= */

.navbar{
position:sticky;
top:0;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid #eee;
}

.nav-inner{
max-width:1100px;
margin:auto;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:700;
}

.menu a{
margin-left:20px;
text-decoration:none;
color:#444;
font-size:14px;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
text-align:center;
padding:110px 20px 60px;
background:linear-gradient(180deg,#f7fbff 0%,#f5f7fa 100%);
}

.hero-logo img{
width:90px;
margin-bottom:20px;
}

.hero h1{
font-size:48px;
margin-bottom:12px;
}

.hero p{
font-size:18px;
color:#6e6e73;
}

/* ========================= */
/* ABOUT */
/* ========================= */

.about-section{
background:white;
}

.about{
text-align:center;
}

.about h2{
font-size:34px;
margin-bottom:12px;
}

.about p{
max-width:700px;
margin:auto;
font-size:17px;
color:#6e6e73;
}

/* ========================= */
/* APP LIST */
/* ========================= */

.apps h2{
text-align:center;
font-size:36px;
margin-bottom:50px;
}

.app-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,260px));
gap:35px;
justify-content:center;
}

.app-card{
background:white;
padding:30px;
border-radius:22px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
text-align:center;
transition:0.25s;
}

.app-card:hover{
transform:translateY(-8px);
box-shadow:0 35px 70px rgba(0,0,0,0.12);
}

.app-icon{
width:80px;
border-radius:20px;
margin-bottom:14px;
}

.app-title{
font-size:20px;
font-weight:700;
}

.app-desc{
font-size:14px;
color:#6e6e73;
margin-top:6px;
}

.store-btn{
display:inline-block;
margin-top:14px;
padding:10px 18px;
background:#0071e3;
color:white;
border-radius:8px;
text-decoration:none;
font-size:13px;
}

.intro-btn{
display:inline-block;
margin-top:8px;
padding:10px 18px;
background:#f1f3f5;
color:#333;
border-radius:8px;
text-decoration:none;
font-size:13px;
}

.coming{
margin-top:16px;
font-size:13px;
color:#888;
}

/* ========================= */
/* APP DETAIL */
/* ========================= */

.app-detail{
padding:100px 20px;
background:white;
}

.app-detail:nth-child(even){
background:#f8fafc;
}

.app-detail-inner{
max-width:1100px;
margin:auto;
}

.app-detail-header{
text-align:center;
margin-bottom:40px;
}

.app-detail-header h2{
font-size:34px;
margin-bottom:10px;
}

.app-detail-header p{
color:#6e6e73;
max-width:650px;
margin:auto;
}

/* ========================= */
/* APP SCREENSHOT */
/* ========================= */
/* APP SCREENSHOT GRID */
/* ========================= */
.screenshot-grid::-webkit-scrollbar{
display:none;
}
.screenshot-grid{

margin-top:40px;

display:grid;

gap:24px;

justify-content:center;

}

/* 세로 스크린샷 (패밀리 루틴) */

.screenshot-portrait{

grid-template-columns:repeat(4,1fr);

max-width:1000px;

margin:auto;

}

.screenshot-portrait img{

width:100%;

max-width:200px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

transition:0.25s;

}

/* 가로 스크린샷 (바다동물의숲) */

.screenshot-landscape{

grid-template-columns:repeat(2,1fr);

max-width:900px;

margin:auto;

}

.screenshot-landscape img{

width:100%;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

}

/* hover */

.screenshot-grid img:hover{

transform:translateY(-6px);

}

/* ========================= */
/* MOBILE */
/* ========================= */

/* ========================= */
/* MOBILE FIX */
/* ========================= */

@media(max-width:768px){

/* 전체 폰트 축소 */

body{
font-size:14px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:14px;
}

.about h2{
font-size:26px;
}

.about p{
font-size:14px;
}

.apps h2{
font-size:28px;
}

.app-title{
font-size:16px;
}

.app-desc{
font-size:13px;
}

.app-detail-header h2{
font-size:26px;
}

.app-detail-header p{
font-size:14px;
}

/* 스크린샷 */

.screenshot-grid{

display:flex;

overflow-x:auto;

gap:16px;

padding:10px 0;

scroll-snap-type:x mandatory;

}

.screenshot-grid img{

flex:0 0 85%;

width:auto;

max-width:none;

height:auto;

scroll-snap-align:center;

}

}

.screenshot-grid{

display:flex;

overflow-x:auto;

gap:16px;

padding:10px;

scroll-snap-type:x mandatory;

}

.screenshot-grid img{

flex:0 0 80%;

scroll-snap-align:center;

max-width:none;

}

}

/* ========================= */
/* CONTACT */
/* ========================= */

.contact{
text-align:center;
}

.contact-box{
background:white;
padding:50px;
border-radius:24px;
max-width:500px;
margin:auto;
box-shadow:0 25px 60px rgba(0,0,0,0.1);
}
   
footer{
text-align:center;
padding:60px;
color:#777;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

.hero h1{
font-size:34px;
}

.hero p{
font-size:15px;
}

}

/* ========================= */
/* APP CARD HOVER UPGRADE */
/* ========================= */

.app-card{
transition:0.25s ease;
}

.app-card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 40px 80px rgba(0,0,0,0.15);
}


/* ========================= */
/* SCREENSHOT HOVER */
/* ========================= */

.screenshot-grid img{
cursor:pointer;
transition:0.25s;
}

.screenshot-grid img:hover{
transform:scale(1.05);
}


/* ========================= */
/* IMAGE MODAL (확대보기) */
/* ========================= */

.image-modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.85);

justify-content:center;

align-items:center;

z-index:9999;

}

.image-modal img{

max-width:90%;

max-height:90%;

border-radius:12px;

}

.image-modal.active{

display:flex;

}  

</style>

</head>

<body>
  
<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal">
<img id="modalImg">
</div>

<!-- NAVBAR -->
<div class="navbar">
<div class="nav-inner">
<div class="logo">GOMSOFT</div>
<div class="menu">
<a href="#apps">Apps</a>
<a href="#contact">Contact</a>
</div>
</div>
</div>

<!-- HERO -->

<section class="hero">

<div class="hero-logo">
<img src="gomsoft_logo.png">
</div>

<h1>GOMSOFT</h1>

<p>
작은 아이디어가 사람들의 일상을 바꾸는 앱이 됩니다.
</p>

</section>

<!-- ABOUT -->

<section class="about-section">
<div class="container about">

<h2>About GOMSOFT</h2>

<p>곰소프트는 실생활에서 바로 사용할 수 있는</p>
<p>모바일 앱과 게임을 개발하는 독립 개발 스튜디오입니다.</p>
<p></p>
<p>단순하지만 유용한 앱,</p>
<p>그리고 즐거움을 주는 캐주얼 게임을 만듭니다.</p>

</div>
</section>

<!-- APP LIST -->

<div class="container apps" id="apps">

<h2>Our Apps</h2>

<div class="app-grid" id="appGrid"></div>

</div>

<!-- APP DETAIL 자동 생성 -->

<div id="appDetailContainer"></div>

<!-- CONTACT -->

<div class="container contact" id="contact">

<div class="contact-box">

<h2>Contact</h2>

<p>협업 · 리뷰 · 문의</p>

<p>
gomstyle3339@gmail.com
</p>

<p>
대표자 : 허구슬 ㅣ 사업자등록번호 : 110-33-91602
</p>

</div>

</div>

<footer>
Copyright © 2026 GOMSOFT
</footer>

<script>

/* ========================= */
/* 앱 데이터 */
/* ========================= */

const apps=[

{
name:"패밀리 루틴",
desc:"가족 일정, 메모, 지출을 한 앱에서 관리하는 가족 통합 올인원 앱",
icon:"familyroutine_icon.png",
link:"https://play.google.com/store/apps/details?id=com.gomsoft.familyroutine",
intro:"https://gomstyle.github.io/FamilyRoutine_Introduction/",
status:"live",
orientation:"portrait",

screenshots:[
"family1.png",
"family2.png",
"family3.png",
"family4.png",
"family5.png",
"family6.png",
"family7.png",
"family8.png"
]

},

{
name:"바다동물의숲",
desc:"바다 동물들을 수집하고 키우는 힐링 캐주얼 게임",
icon:"ocean_forest_icon.png",
status:"paused",
orientation:"landscape",

screenshots:[
"ocean1.jpg",
"ocean2.jpg",
"ocean3.jpg",
"ocean4.jpg"
]

}

];

const grid=document.getElementById("appGrid");
const detailContainer=document.getElementById("appDetailContainer");

apps.forEach((app,index)=>{

/* 카드 */

const card=document.createElement("div");
card.className="app-card";

let buttons="";

if(app.status==="live"){

buttons=`

<a class="store-btn" href="${app.link}" target="_blank">
Google Play
</a>

<a class="intro-btn" href="${app.intro}" target="_blank">
앱 소개 보기
</a>

`;

}else{

buttons=`

<div class="coming">
현재 리뉴얼 업데이트 준비 중입니다
</div>

`;

}

card.innerHTML=`

<img class="app-icon" src="${app.icon}">

<div class="app-title">${app.name}</div>

<div class="app-desc">${app.desc}</div>

${buttons}

`;

grid.appendChild(card);


/* 상세 섹션 */

let screens="";

app.screenshots.forEach(img=>{

screens+=`<img src="${img}">`;

});

const detail=document.createElement("section");
detail.className="app-detail";

detail.innerHTML=`

<div class="app-detail-inner">

<div class="app-detail-header">

<h2>${app.name}</h2>

<p>${app.desc}</p>

</div>

<div class="screenshot-grid screenshot-${app.orientation}">
${screens}
</div>

</div>

`;

detailContainer.appendChild(detail);

});

/* slider 기능 */

document.querySelectorAll(".slider-container").forEach(container=>{

const slider=container.querySelector(".slider");

let index=0;

container.querySelector(".slider-right").onclick=()=>{

index++;

slider.style.transform=`translateX(-${index*300}px)`;

};

container.querySelector(".slider-left").onclick=()=>{

index--;

if(index<0) index=0;

slider.style.transform=`translateX(-${index*300}px)`;

};

});
/* ========================= */
/* SCREENSHOT CLICK ZOOM */
/* ========================= */

const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

document.addEventListener("click",function(e){

if(e.target.closest(".screenshot-grid img")){

modal.classList.add("active");

modalImg.src = e.target.src;

}

});

/* 모달 클릭하면 닫기 */

modal.addEventListener("click",function(){

modal.classList.remove("active");

});
</script>

</body>
</html>
