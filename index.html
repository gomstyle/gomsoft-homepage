<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOMSOFT | Mobile App Studio</title>

<style>

/* ========================= */
/* 기본 스타일 */
/* ========================= */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f5f7fa;
color:#1d1d1f;
line-height:1.6;
}

/* 페이지 폭 */

.container{
max-width:1080px;
margin:auto;
padding:70px 20px;
}


/* ========================= */
/* 네비게이션 */
/* ========================= */

.navbar{
position:sticky;
top:0;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(8px);
border-bottom:1px solid #eee;
}

.nav-inner{
max-width:1080px;
margin:auto;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:700;
}

.menu a{
margin-left:22px;
text-decoration:none;
color:#444;
font-size:14px;
}


/* ========================= */
/* HERO */
/* ========================= */

.hero{
text-align:center;
padding:90px 20px 40px;
background:linear-gradient(180deg,#f7fbff 0%,#f5f7fa 100%);
}

.hero h1{
font-size:52px;
font-weight:800;
}

.hero p{
font-size:18px;
color:#6e6e73;
}

.cta{

display:inline-block;

margin-top:25px;

padding:14px 28px;

background:#0071e3;

color:white;

border-radius:12px;

text-decoration:none;

font-weight:600;

}


/* ========================= */
/* 앱 목록 */
/* ========================= */

.apps h2{
text-align:center;
font-size:34px;
margin-bottom:50px;
}

.app-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,260px));

gap:35px;

justify-content:center;

}

.app-card{

background:white;

padding:30px;

border-radius:22px;

box-shadow:0 20px 50px rgba(0,0,0,0.08);

text-align:center;

transition:0.25s;

}

.app-card:hover{

transform:translateY(-8px);

box-shadow:0 35px 70px rgba(0,0,0,0.12);

}

.app-icon{
width:80px;
border-radius:20px;
margin-bottom:14px;
}

.app-title{
font-size:20px;
font-weight:700;
}

.app-desc{
font-size:14px;
color:#6e6e73;
margin-top:6px;
}

.store-btn{

display:inline-block;

margin-top:14px;

padding:10px 18px;

background:#0071e3;

color:white;

border-radius:8px;

text-decoration:none;

font-size:13px;

}


/* ========================= */
/* CONTACT */
/* ========================= */

.contact{
text-align:center;
}

.contact-box{

background:white;

padding:50px;

border-radius:24px;

max-width:500px;

margin:auto;

box-shadow:0 25px 60px rgba(0,0,0,0.1);

}

footer{
text-align:center;
padding:60px;
color:#777;
}


/* ========================= */
/* 모바일 */
/* ========================= */

@media(max-width:900px){

.hero h1{
font-size:36px;
}

.hero p{
font-size:15px;
}

.app-title{
font-size:18px;
}

.app-desc{
font-size:13px;
}

}

</style>

</head>


<body>


<!-- ========================= -->
<!-- NAVBAR -->
<!-- ========================= -->

<div class="navbar">

<div class="nav-inner">

<div class="logo">GOMSOFT</div>

<div class="menu">

<a href="#apps">Apps</a>
<a href="#contact">Contact</a>

</div>

</div>

</div>



<!-- ========================= -->
<!-- HERO -->
<!-- ========================= -->

<section class="hero">

<h1>GOMSOFT</h1>

<p>

작은 아이디어가  
사람들의 일상을 바꾸는 앱이 됩니다.

</p>

<a class="cta" href="#apps">

개발 앱 보기

</a>

</section>



<!-- ========================= -->
<!-- APP LIST -->
<!-- ========================= -->

<div class="container apps" id="apps">

<h2>Our Apps</h2>

<div class="app-grid" id="appGrid">

<!-- 앱 카드가 자동 생성되는 영역 -->

</div>

</div>



<!-- ========================= -->
<!-- CONTACT -->
<!-- ========================= -->

<div class="container contact" id="contact">

<div class="contact-box">

<h2>Contact</h2>

<p style="color:#6e6e73;">
협업 · 리뷰 · 문의
</p>

<p>
gomstyle3339@gmail.com
</p>

<p style="color:#6e6e73;">
대표자 : 허구슬 ㅣ 사업자등록번호 : 110-33-91602
</p>

</div>

</div>



<footer>

Copyright © 2026 GOMSOFT. 모든 권리 보유.

</footer>



<!-- ================================================= -->
<!-- 앱 자동 생성 시스템 -->
<!-- ================================================= -->

<script>

/*
========================================
새 앱 추가 방법

아래 apps 배열에

name
desc
icon
link

만 추가하면
앱 카드가 자동 생성됩니다
========================================
*/

const apps = [

{
name:"패밀리 루틴",
desc:"가족 일정, 메모, 지출을 한 앱에서 관리하는 가족 통합 올인원 앱",
icon:"familyroutine_icon.png",
link:"https://play.google.com/store/apps/details?id=com.gomsoft.familyroutine"
},

{
name:"바다동물의숲",
desc:"바다 동물들을 수집하고 키우는 힐링 캐주얼 게임",
icon:"ocean_forest_icon.png",
link:"구글플레이링크"
}

];



/*
========================================
앱 카드 자동 생성 코드
수정할 필요 없음
========================================
*/

const grid = document.getElementById("appGrid");

apps.forEach(app=>{

const card = document.createElement("div");

card.className="app-card";

card.innerHTML=`

<img class="app-icon" src="${app.icon}">

<div class="app-title">
${app.name}
</div>

<div class="app-desc">
${app.desc}
</div>

<a class="store-btn" href="${app.link}" target="_blank">

Google Play

</a>

`;

grid.appendChild(card);

});

</script>


</body>
</html>
