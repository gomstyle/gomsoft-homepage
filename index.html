<!DOCTYPE html>
<html lang="ko">

<head>

<!-- ===================================================== -->
<!-- 기본 설정 (수정할 필요 없음) -->
<!-- ===================================================== -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOMSOFT | App Development Studio</title>

<style>

/* ===================================================== */
/* 기본 스타일 */
/* ===================================================== */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f6f8fb;
color:#222;
line-height:1.6;
}

/* 전체 콘텐츠 폭 제한 */
.container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}


/* ===================================================== */
/* 상단 메뉴 */
/* ===================================================== */

.navbar{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
z-index:100;
}

.nav-inner{
max-width:1100px;
margin:auto;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:800;
}

.menu a{
margin-left:20px;
text-decoration:none;
color:#444;
font-size:14px;
}

.menu a:hover{
color:#2e7d32;
}


/* ===================================================== */
/* HERO 영역 */
/* ===================================================== */

.hero{
text-align:center;
padding:120px 20px 90px;
background:linear-gradient(180deg,#f6fbff 0%,#f6f8fb 100%);
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#666;
max-width:600px;
margin:auto;
}

.cta{
display:inline-block;
margin-top:30px;
padding:16px 30px;
background:#2e7d32;
color:white;
border-radius:12px;
text-decoration:none;
font-weight:700;
}

.cta:hover{
opacity:0.9;
}


/* ===================================================== */
/* 앱 카드 영역 */
/* ===================================================== */

.apps h2{
text-align:center;
font-size:30px;
margin-bottom:40px;
}

/* ===================================================== */
/* 앱 카드 GRID */
/* 핵심 부분 */
/* 카드 개수 상관없이 가운데 정렬됨 */
/* ===================================================== */

.app-grid{

display:grid;

/* 카드 자동 배치 */
grid-template-columns:repeat(auto-fit,minmax(260px,260px));

gap:26px;

justify-content:center;

}

/* ===================================================== */
/* 앱 카드 디자인 */
/* ===================================================== */

.app-card{

background:white;

padding:26px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,0.07);

text-align:center;

transition:0.2s;

}

.app-card:hover{
transform:translateY(-6px);
}

/* 앱 아이콘 */
.app-icon{
width:70px;
border-radius:16px;
margin-bottom:12px;
}

/* 앱 이름 */
.app-title{
font-size:18px;
font-weight:700;
}

/* 앱 설명 */
.app-desc{
font-size:14px;
color:#666;
margin-top:6px;
}

/* 스토어 버튼 */
.store-btn{

display:inline-block;

margin-top:14px;

padding:10px 16px;

background:#4CAF50;

color:white;

border-radius:8px;

text-decoration:none;

font-size:13px;

}


/* ===================================================== */
/* Contact */
/* ===================================================== */

.contact{
text-align:center;
}

.contact-card{

background:white;

padding:40px;

border-radius:18px;

max-width:500px;

margin:auto;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

}


/* ===================================================== */
/* Footer */
/* ===================================================== */

footer{

text-align:center;

padding:60px 20px;

font-size:14px;

color:#888;

}


/* ===================================================== */
/* 모바일 반응형 */
/* ===================================================== */

@media(max-width:600px){

.hero h1{
font-size:32px;
}

}

</style>

</head>



<body>



<!-- ===================================================== -->
<!-- 상단 메뉴 -->
<!-- ===================================================== -->

<div class="navbar">

<div class="nav-inner">

<div class="logo">

GOMSOFT

</div>

<div class="menu">

<a href="#apps">Apps</a>
<a href="#contact">Contact</a>

</div>

</div>

</div>



<!-- ===================================================== -->
<!-- HERO -->
<!-- ===================================================== -->

<section class="hero">

<h1>GOMSOFT</h1>

<p>

실생활을 더 편리하게 만드는  
모바일 앱을 개발합니다

</p>

<a class="cta" href="#apps">

개발 앱 보기

</a>

</section>



<!-- ===================================================== -->
<!-- 앱 목록 -->
<!-- ===================================================== -->

<div class="container apps" id="apps">

<h2>Our Apps</h2>

<div class="app-grid">


<!-- ===================================================== -->
<!-- 앱 카드 시작 -->
<!-- ===================================================== -->
<!-- 앱 추가할 때 이 블록을 그대로 복사해서 사용하면 된다 -->
<!-- ===================================================== -->

<div class="app-card">

<img class="app-icon" src="app_icon.png">

<div class="app-title">

패밀리 루틴

</div>

<div class="app-desc">

가족 일정, 메모, 지출을  
한 앱에서 관리하는 가족 관리 앱

</div>

<a class="store-btn"

href="https://play.google.com/store/apps/details?id=com.gomsoft.familyroutine"

target="_blank">

Google Play

</a>

</div>


<!-- ===================================================== -->
<!-- 앱 카드 끝 -->
<!-- ===================================================== -->



</div>

</div>



<!-- ===================================================== -->
<!-- Contact -->
<!-- ===================================================== -->

<div class="container contact" id="contact">

<div class="contact-card">

<h2>Contact</h2>

<p>

협업 / 리뷰 / 문의

<br><br>

📧 gomsoft.contact@gmail.com

</p>

</div>

</div>



<footer>

© 2026 GOMSOFT  
App Development Studio

</footer>


</body>

</html>
